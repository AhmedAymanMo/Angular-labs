<div class="app">
  <app-upper-header class="app__upper-header"></app-upper-header>
  <app-lower-header class="app__lower-header"></app-lower-header>

  <main class="app-content">
    <router-outlet></router-outlet>
  </main>

  <app-my-footer class="app__footer"></app-my-footer>

  @if (isLoading()) {

      <div class="loading-spinner-wrapper">
        <div class="loading-spinner"></div>
        <p class="loading-text">Resolving details, please wait...</p>
      </div>
    </div>
  }
</div>
