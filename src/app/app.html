<div class="app">
  <app-upper-header class="app__upper-header"></app-upper-header>
  <app-lower-header class="app__lower-header"></app-lower-header>

  <main class="app-content">
    <div class="app-layout">
      <div class="app-layout__products">
        <app-product-list (addToCart)="onAddToCart($event)"></app-product-list>
      </div>
      <div class="app-layout__cart">
        <app-shopping-cart 
          [cartItems]="cartItems" 
          (updateQuantity)="onUpdateQuantity($event)"
          (removeItem)="onRemoveItem($event)">
        </app-shopping-cart>
      </div>
    </div>
  </main>

  <app-my-footer class="app__footer"></app-my-footer>
</div>
