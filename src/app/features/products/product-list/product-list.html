<div class="product-list-container">
  <h2 class="product-list-title">products</h2>
  <div class="product-grid">
    @for (product of products(); track product.id) {
      <div class="product-grid__item">
        <app-product-card 
          [product]="product" 
          (addToCart)="addToCart.emit($event)">
        </app-product-card>
      </div>
    }
  </div>
</div>
